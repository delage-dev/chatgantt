services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CHATGANTT_ENV=dev
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  agent:
    build: ./backend
    command: python -m agent.agent start
    env_file:
      - ./backend/.env
    # No exposed ports — the agent dials out to LiveKit Cloud via WebRTC/WebSocket.
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api
    restart: unless-stopped
